# alembic.ini
# Place this file at: backend/alembic.ini
# (the repo's alembic/env.py already overrides sqlalchemy.url at runtime
#  from app.config.settings.database_url_sync, so no DB credentials go here)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

[post_write_hooks]

# ---- Logging config (required because alembic/env.py calls fileConfig()) ----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
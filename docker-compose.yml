services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-productos_ai}
      POSTGRES_USER: ${POSTGRES_USER:-productos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    build: { context: ./backend, target: development }
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AGENT_CHECKPOINT_REDIS_URL: redis://redis:6379/3
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-productos}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-productos_ai}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-productos}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-productos_ai}
      DUCKDB_PATH: /app/data/analytics.duckdb
    volumes: [./backend:/app, backend_data:/app/data]
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  frontend:
    build: { context: ./frontend, target: development }
    environment: { VITE_API_BASE_URL: http://localhost:8000 }
    volumes: [./frontend:/app, /app/node_modules]
    ports: ["5173:5173"]
    depends_on: [backend]
volumes:
  postgres_data:
  redis_data:
  backend_data:

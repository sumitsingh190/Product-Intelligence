global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "productos_backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
  
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "otel_collector"
    static_configs:
      - targets: ["otel_collector:8888"]